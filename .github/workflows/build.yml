name: Build TrialLens.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller streamlit pdfminer.six requests pandas

      - name: Build exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconfirm `
            --name TrialLens `
            --hidden-import streamlit `
            --hidden-import streamlit.runtime.scriptrunner.magic_funcs `
            --hidden-import pdfminer `
            --hidden-import pdfminer.high_level `
            --hidden-import pdfminer.layout `
            --hidden-import pdfminer.converter `
            --hidden-import pdfminer.pdfpage `
            --hidden-import requests `
            --hidden-import pandas `
            --collect-all streamlit `
            --collect-all pdfminer `
            --add-data "app.py;." `
            launcher.py

      - name: Test exe exists
        run: |
          if (Test-Path "dist/TrialLens.exe") {
            Write-Host "✅ TrialLens.exe built successfully"
            $size = (Get-Item "dist/TrialLens.exe").length / 1MB
            Write-Host "Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "❌ Build failed"
            exit 1
          }

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrialLens-Windows
          path: dist/TrialLens.exe
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TrialLens 临镜 v1.0.${{ github.run_number }}"
          body: |
            ## TrialLens 临镜

            ### 下载使用
            下载下方的 `TrialLens.exe`，双击运行，无需安装任何软件。

            **首次启动需要 30-60 秒**，请耐心等待浏览器自动打开。
            如未自动打开，请手动访问 http://localhost:8501

            ### 使用步骤
            1. 双击 `TrialLens.exe`
            2. 等待浏览器自动打开（约 30-60 秒）
            3. 上传 ClinicalTrials.gov 导出的 CSV 开始使用

            ---
            © 2025 Dr Zhang. For academic and research use only.
          files: dist/TrialLens.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
